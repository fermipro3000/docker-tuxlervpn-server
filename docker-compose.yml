version: '3.3'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker-tuxlervpn-server
    container_name: tuxler-vpn
    privileged: true
    network_mode: bridge
    shm_size: '2g'
    environment:
      - PROXY_URL=${PROXY_URL:-http://127.0.0.1:8080}
    ports:
      - '127.0.0.1:1701:1701'
      - '127.0.0.1:10702:10702'
      - '127.0.0.1:19703:19703'
      - '127.0.0.1:28704:28704'
      - '127.0.0.1:37705:37705'
      - '127.0.0.1:46706:46706'
      - '127.0.0.1:55707:55707'
      - '127.0.0.1:64708:64708'
      - '127.0.0.1:23321:23321'
      - '127.0.0.1:23322:23322'
      - '127.0.0.1:23323:23323'
      - '127.0.0.1:23324:23324'
      - '127.0.0.1:23325:23325'
      - '127.0.0.1:23326:23326'
      - '127.0.0.1:23327:23327'
      - '127.0.0.1:23328:23328'
    restart: unless-stopped
